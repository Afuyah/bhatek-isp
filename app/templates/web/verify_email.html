<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | Bhatek ISP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e8f0ee 0%, #d4e4df 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .verify-card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #e8f0ee;
            border-top: 3px solid #2d6a4f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn-primary {
            background: #2d6a4f;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #1b4d3e;
            transform: translateY(-2px);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #2d6a4f10;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .success-icon i {
            font-size: 40px;
            color: #2d6a4f;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            background: #dc354510;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .error-icon i {
            font-size: 40px;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="verify-card">
            <div id="loadingState">
                <div class="spinner"></div>
                <h4>Verifying your email...</h4>
                <p class="text-muted mt-3">Please wait while we confirm your email address</p>
            </div>
            
            <div id="successState" style="display: none;">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h4 class="mb-3">Email Verified! 🎉</h4>
                <p class="text-muted mb-4">Your email has been successfully verified. You can now complete your registration.</p>
                <button class="btn btn-primary" onclick="continueToRegistration()">
                    Continue to Registration <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </div>
            
            <div id="errorState" style="display: none;">
                <div class="error-icon">
                    <i class="fas fa-times-circle"></i>
                </div>
                <h4 class="mb-3">Verification Failed</h4>
                <p id="errorMessage" class="text-muted mb-4"></p>
                <a href="/" class="btn btn-primary">
                    Return to Home <i class="fas fa-home ms-2"></i>
                </a>
            </div>
        </div>
    </div>
    
    <script>
        const token = '{{ token }}';
        
        async function verifyEmail() {
            try {
                const response = await fetch('/api/v1/auth/verify-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token: token })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Show success state
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                    
                    // Store email for registration
                    sessionStorage.setItem('verified_email', data.email);
                } else {
                    showError(data.error || 'Invalid or expired verification link');
                }
            } catch (error) {
                console.error('Verification error:', error);
                showError('Network error. Please check your connection and try again.');
            }
        }
        
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }
        
        function continueToRegistration() {
            const email = sessionStorage.getItem('verified_email');
            if (email) {
                window.location.href = `/register?email=${encodeURIComponent(email)}`;
            } else {
                window.location.href = '/register';
            }
        }
        
        // Start verification
        verifyEmail();
    </script>
</body>
</html>
