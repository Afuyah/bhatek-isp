{% extends "web/organization/base.html" %}

{% block title %}{{ organization.name }} - Create Plan{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div><h4 class="mb-1">Create Service Plan</h4><p class="text-muted mb-0">Add a new internet service plan</p></div>
        <a href="{{ url_for('billing_web.plans', org_id=organization.id) }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Back</a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Plan Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required value="{{ form_data.name if form_data else '' }}" placeholder="e.g., Basic 10Mbps">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Plan Type <span class="text-danger">*</span></label>
                        <select name="plan_type" class="form-select" required>
                            <option value="hotspot" {% if form_data.plan_type == 'hotspot' %}selected{% endif %}>Hotspot</option>
                            <option value="pppoe" {% if form_data.plan_type == 'pppoe' %}selected{% endif %}>PPPoE</option>
                            <option value="both" {% if form_data.plan_type == 'both' %}selected{% endif %}>Both</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Billing Cycle</label>
                        <select name="billing_cycle" class="form-select">
                            <option value="monthly" selected>Monthly</option>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="quarterly">Quarterly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Validity Type <span class="text-danger">*</span></label>
                        <select name="validity_type" class="form-select" required>
                            <option value="time_based">Time Based (Days)</option>
                            <option value="data_based">Data Based (MB/GB)</option>
                            <option value="unlimited">Unlimited</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Validity Days</label>
                        <input type="number" name="validity_days" class="form-control" value="{{ form_data.validity_days or '30' }}" placeholder="30">
                        <small class="text-muted">For time-based plans</small>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Data Limit (MB)</label>
                        <input type="number" name="data_limit_mb" class="form-control" value="{{ form_data.data_limit_mb or '' }}" placeholder="10240">
                        <small class="text-muted">For data-based plans</small>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Download Speed (Mbps)</label>
                        <input type="number" name="bandwidth_down_mbps" class="form-control" value="{{ form_data.bandwidth_down_mbps or '10' }}" placeholder="10">
                        <small class="text-muted">0 = Unlimited</small>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Upload Speed (Mbps)</label>
                        <input type="number" name="bandwidth_up_mbps" class="form-control" value="{{ form_data.bandwidth_up_mbps or '10' }}" placeholder="10">
                        <small class="text-muted">0 = Unlimited</small>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Device Limit</label>
                        <input type="number" name="device_limit" class="form-control" value="{{ form_data.device_limit or '1' }}" placeholder="1">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Price (KES) <span class="text-danger">*</span></label>
                        <input type="number" step="0.01" name="price" class="form-control" required value="{{ form_data.price or '' }}" placeholder="1000.00">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Setup Fee (KES)</label>
                        <input type="number" step="0.01" name="setup_fee" class="form-control" value="{{ form_data.setup_fee or '0' }}" placeholder="0.00">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="2" placeholder="Plan description...">{{ form_data.description if form_data else '' }}</textarea>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <div class="form-check form-switch">
                            <input type="checkbox" name="is_active" class="form-check-input" id="isActive" checked>
                            <label class="form-check-label" for="isActive">Active</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check form-switch">
                            <input type="checkbox" name="is_public" class="form-check-input" id="isPublic" checked>
                            <label class="form-check-label" for="isPublic">Public (Visible on portal)</label>
                        </div>
                    </div>
                </div>

                <hr>
                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('billing_web.plans', org_id=organization.id) }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Create Plan</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
