{% extends "web/organization/base.html" %}

{% block title %}{{ organization.name }} - Add Device{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 500px;
        margin: 0 auto;
    }
    .form-card {
        background: white;
        border-radius: 0.75rem;
        border: 1px solid #e5e7eb;
        overflow: hidden;
    }
    .form-header {
        padding: 1rem 1.25rem;
        background: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
    }
    .form-body {
        padding: 1.25rem;
    }
    .form-group {
        margin-bottom: 1rem;
    }
    .form-label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        margin-bottom: 0.375rem;
        color: #374151;
    }
    .form-input, .form-select {
        width: 100%;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.375rem;
    }
    .form-input:focus, .form-select:focus {
        outline: none;
        border-color: #1a56db;
        box-shadow: 0 0 0 2px rgba(26, 86, 219, 0.1);
    }
    .help-text {
        font-size: 0.7rem;
        color: #6b7280;
        margin-top: 0.25rem;
    }
    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid #e5e7eb;
    }
    .btn-cancel {
        background: white;
        border: 1px solid #e5e7eb;
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
        border-radius: 0.375rem;
        color: #6b7280;
        text-decoration: none;
    }
    .btn-add {
        background: #1a56db;
        border: none;
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
        border-radius: 0.375rem;
        color: white;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1">Add Device</h4>
            <p class="text-muted mb-0">Register a device for this subscriber</p>
        </div>
        <a href="{{ url_for('subscriber_web.show', org_id=organization.id, subscriber_id=subscriber_id) }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back
        </a>
    </div>

    <div class="form-container">
        <div class="form-card">
            <div class="form-header">
                <h3><i class="fas fa-microchip me-2"></i>Device Details</h3>
            </div>
            <div class="form-body">
                <form method="POST">
                    <div class="form-group">
                        <label class="form-label">MAC Address <span class="text-danger">*</span></label>
                        <input type="text" name="mac_address" class="form-input" required 
                               value="{{ form_data.mac_address if form_data else '' }}" 
                               placeholder="AA:BB:CC:DD:EE:FF">
                        <div class="help-text">Format: XX:XX:XX:XX:XX:XX</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Device Name</label>
                        <input type="text" name="device_name" class="form-input" 
                               value="{{ form_data.device_name if form_data else '' }}" 
                               placeholder="John's Phone">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Device Type</label>
                        <select name="device_type" class="form-select">
                            <option value="phone">Phone</option>
                            <option value="tablet">Tablet</option>
                            <option value="laptop">Laptop</option>
                            <option value="desktop">Desktop</option>
                            <option value="router">Router</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <a href="{{ url_for('subscriber_web.show', org_id=organization.id, subscriber_id=subscriber_id) }}" class="btn-cancel">Cancel</a>
                        <button type="submit" class="btn-add"><i class="fas fa-plus me-2"></i>Add Device</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
