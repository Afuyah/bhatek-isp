<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhalinks</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f2f5;
            margin: 0;
        }
        .error-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .error-card h1 { font-size: 20px; margin: 16px 0 8px; color: #1a1a2e; }
        .error-card p { font-size: 14px; color: #64748b; margin: 0; }
    </style>
</head>
<body>
    <div class="error-card">
        <div style="font-size:48px;">📡</div>
        <h1>{{ message }}</h1>
        <p>Please contact your internet service provider for assistance.</p>
    </div>
</body>
</html>
